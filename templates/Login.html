<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/Css/Login.css">
    <title>Registro</title>
</head>
<body>
  <div class="container text-center Carta_Registro">
    <div class="row align-items-center">
      <div class="col">
        <h3>Registro De Usuario</h3>
        <div class="card"> 
          <div class="card-body">
            <form action="/registrar" method="POST">
              <p class="form-label">Nombre de Usuario</p>
              <input type="text" name="usuario" class="form-control" placeholder="Usuario" required>
              <p class="form-label">Correo Electronico</p>
              <input type="email" name="correo" class="form-control" placeholder="example@example.com" required>
              <p class="form-label">Contraseña</p>
              <input type="password" name="password" class="form-control" placeholder="example123" required>
              <p class="form-label">Confirmar Contraseña</p>
              <input type="password" name="confirmar" class="form-control" placeholder="example123" required>
              <button class="btn btn-primary mt-3">
                Registrarse
              </button>
            </form>
            <p class="mt-3">¿Ya tienes una cuenta? <a href="/inicio">Inicia Sesión</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
