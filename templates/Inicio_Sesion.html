<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/Css/Login.css">
    <title>Iniciar Sesión - Moda Total</title>
</head>
<body>
  <div class="container text-center Carta_Registro">
    <div class="row align-items-center">
      <div class="col">
        <h3><i class="bi bi-person-circle me-2"></i>Iniciar Sesión</h3>
        <div class="card">
          <div class="card-body">
            {% if error %}
            <div style="background:rgba(220,53,69,0.25); border:1px solid rgba(220,53,69,0.5); color:#ffaaaa; border-radius:8px; padding:8px 14px; font-size:0.82rem; margin-bottom:14px;">
              <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
            </div>
            {% endif %}
            <form action="/inicio_sesion" method="POST">
              <p class="form-label">Correo Electrónico</p>
              <input type="email" name="correo" class="form-control" placeholder="example@example.com" required>
              <p class="form-label">Contraseña</p>
              <input type="password" name="password" class="form-control" placeholder="example123" required>
              <button class="btn btn-primary mt-3 w-100">Iniciar Sesión</button>
            </form>
            <hr style="border-color:rgba(255,255,255,0.15); margin:14px 0;">
            <p class="mt-2" style="font-size:0.83rem;">¿No tienes una cuenta? <a href="/login" style="color:#D89B5B;">Regístrate</a></p>
            <p style="font-size:0.83rem;"><a href="/" style="color:rgba(255,255,255,0.5);"><i class="bi bi-arrow-left me-1"></i>Volver a la tienda</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
