<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/Css/Login.css">
    <title>Registro</title>
</head>
<body>
  <div class="container text-center Carta_Registro">
    <div class="row align-items-center">
      <div class="col">
        <div class="card"> 
          <i class="bi bi-person-circle" style="font-size: 65px ; color: rgba(236, 181, 99, 0.397);"></i>
          <hr style="margin: 2px;">
          <div class="card-body">
            <form action="/registrar" method="POST">
              <p class="form-label">¡Bienvenido, {{usuario}}!</p>
              <input type="email" name="correo" class="form-control" placeholder="example@example.com" required>
              <p class="form-label">Contraseña</p>
              <input type="password" name="password" class="form-control" placeholder="example123" required>
              <button class="btn btn-primary mt-3">
                Inicia Sesion
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
