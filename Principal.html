<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Mi web</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg barra_navegacion">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Tienda De Ropa</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav barra_texto">
          <li class="nav-item">
            <a class="nav-link" aria-current="page" href="#">Principal</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Destacados</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Categorias</a>
          </li>
          <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true">Contactos</a>
          </li>
        </ul>
      </div>
      <form class="d-flex barra_busqueda" role="search">
        <input class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Buscar"/>
        <button class="btn btn-outline-dark" type="submit">Buscar</button>
      </form>
      <a href="/Paginas/Login.html" class="Login_link">
        <i class="bi bi-person login"></i>
      </a>
    </div>
  </nav>
  <img src="Imagenes/Pagina_Principal.png" alt="Imagen de la tienda">
  <h1 class="text-center titulo_principal" style="padding: 20px;">! Bienvenidos a nuestra tienda de ropa ¡</h1>
  <div class="container text-center contenido_principal">
    <div class="row align-items-start">
      <div class="col Columnas_Principal">
        <p>Lo mas popular</p> 
        <div class="card" style="width: 18rem;">
          <a href="#">
            <img src="Imagenes/Polo.png" class="card-img-top" alt="Polo">
          </a>
          <div class="card-body">
            <p class="card-text"></p>
          </div>
        </div>
      </div>
      <div class="col Columnas_Principal">
        <p>Lo mas nuevo</p>
        <div class="card" style="width: 18rem;">
          <a href="#">
            <img src="Imagenes/Camisas.png" class="card-img-top" alt="Camisas">
          </a>
          <div class="card-body">
            <p class="card-text"></p>
          </div>
        </div>
      </div>
      <div class="col Columnas_Principal">
        <p>Lo mejor valorado</p>
        <div class="card" style="width: 18rem;">
          <a href="#">
            <img src="Imagenes/Chalecos.png" class="card-img-top" alt="Chalecos">
          </a>
          <div class="card-body">
            <p class="card-text"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="carouselExampleCaptions" class="carousel slide">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="/Imagenes/Clasico.png" class="d-block w-100" alt="Ropa Clasica">
        <div class="carousel-caption d-none d-md-block">
          <h5>Clasico</h5>
        </div>
      </div>
      <div class="carousel-item">
        <img src="/Imagenes/Urbano.png" class="d-block w-100" alt="Ropa Urbana">
        <div class="carousel-caption d-none d-md-block">
          <h5>Urbano</h5>
        </div>
      </div>
      <div class="carousel-item">
        <img src="/Imagenes/Minimalista.png" class="d-block w-100" alt="Ropa Minimalista">
        <div class="carousel-caption d-none d-md-block">
          <h5>Minimalista</h5>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer class="text-center" style="padding: 20px; background-color: #f8f9fa;">
  <p>&copy; 2024 Tienda De Ropa. Todos los derechos reservados.</p>
</footer>
</html>
